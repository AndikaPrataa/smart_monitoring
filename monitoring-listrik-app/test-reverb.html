<!DOCTYPE html>
<html>
<head>
    <title>Test Laravel Reverb</title>
</head>
<body>
    <h2>Test Laravel Reverb WebSocket</h2>

    <p>Status: <span id="status">Connecting...</span></p>

    <h3>Log:</h3>
    <pre id="log"></pre>

    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>

    <script>
        const log = document.getElementById('log');
        const status = document.getElementById('status');

        function addLog(message, data = null) {
            const time = new Date().toLocaleTimeString();
            log.textContent += `[${time}] ${message}\n`;

            if (data) {
                log.textContent += JSON.stringify(data, null, 2) + "\n\n";
            }
        }

        const pusher = new Pusher('efksfxfxxfrzuetobo5f', {
            wsHost: '192.168.101.75',
            wsPort: 8080,
            forceTLS: false,
            encrypted: false,
            disableStats: true,
            enabledTransports: ['ws'],
            cluster: 'mt1'
        });

        pusher.connection.bind('connected', () => {
            status.textContent = 'Connected';
            addLog('WebSocket connected');
        });

        pusher.connection.bind('error', (err) => {
            status.textContent = 'Error';
            addLog('WebSocket error', err);
        });

        pusher.connection.bind('disconnected', () => {
            status.textContent = 'Disconnected';
            addLog('WebSocket disconnected');
        });

        // =========================
        // MONITORING LINGKUNGAN
        // =========================

        pusher.subscribe('monitoring.suhu')
            .bind('suhu.updated', function(data) {
                addLog('Received suhu.updated', data);
            });

        pusher.subscribe('monitoring.kelembapan')
            .bind('kelembapan.updated', function(data) {
                addLog('Received kelembapan.updated', data);
            });

        pusher.subscribe('monitoring.pm25')
            .bind('pm25.updated', function(data) {
                addLog('Received pm25.updated', data);
            });

        pusher.subscribe('monitoring.pm10')
            .bind('pm10.updated', function(data) {
                addLog('Received pm10.updated', data);
            });

        pusher.subscribe('monitoring.gas_co')
            .bind('gas_co.updated', function(data) {
                addLog('Received gas_co.updated', data);
            });

        pusher.subscribe('monitoring.gas_co2')
            .bind('gas_co2.updated', function(data) {
                addLog('Received gas_co2.updated', data);
            });

        pusher.subscribe('monitoring.tvoc')

            });

        pusher.subscribe('monitoring.cahaya')

        pusher.subscribe('monitoring.ieq')

                addLog('Received ieq.updated', data);
            });

        // =========================
        // LISTRIK
        // =========================

            });

        pusher.subscribe('listrik.voltage.l2l3')

        pusher.subscribe('listrik.voltage.l3l1')

        // =========================

        // =========================

        pusher.subscribe('daya.active.r')

        pusher.subscribe('daya.apparent.r')

        pusher.subscribe('daya.apparent.s')

            });

        pusher.subscribe('daya.apparent.t')

        pusher.subscribe('daya')
            .bind('daya.updated', function(data) {

            });

        pusher.subscribe('daya.biaya')
            .bind('daya.biaya.updated', function(data) {
                addLog('Received daya.biaya.updated', data);
            });

        pusher.subscribe('monitoring.history')
    .bind('monitoring.history.updated', function(data) {
        addLog('Received monitoring.history.updated', data);
    });

pusher.subscribe('listrik.history')
    .bind('listrik.history.updated', function(data) {
        addLog('Received listrik.history.updated', data);
    });

pusher.subscribe('daya.history')
    .bind('daya.history.updated', function(data) {

    });
    </script>
